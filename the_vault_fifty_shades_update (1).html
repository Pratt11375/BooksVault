
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Dark Blue Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap');

        :root {
            --bg-deep-blue: #020412;
            --surface: #0a0d24;
            --accent-gold: #c5a059;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --border: #1a224a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep-blue);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .counter-box {
            font-size: 0.6rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            padding: 4px 12px;
        }

        .oracle-container {
            background-color: var(--surface);
            border: 1px solid var(--accent-gold);
            padding: 15px 25px;
            text-align: center;
            width: 100%;
            max-width: 450px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .mood-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .mood-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 3px;
            font-size: 0.55rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .mood-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        #oracle-result {
            border-top: 1px solid var(--border);
            padding-top: 12px;
            min-height: 80px;
        }

        .oracle-commentary { font-style: italic; color: var(--accent-gold); margin-bottom: 4px; font-size: 0.75rem; }
        .oracle-book-title { font-family: 'Cinzel', serif; font-size: 1rem; text-transform: uppercase; }

        .view-toggle {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 15px;
            font-size: 0.65rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(197, 160, 89, 0.05);
        }

        .controls-container {
            width: 100%;
            max-width: 700px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-select, #search-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
        }

        #search-input { border: none; border-bottom: 1px solid var(--border); background: none; text-align: center; width: 100%; }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .book-list {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 1100px;
            gap: 10px;
        }

        .list-item {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr 1fr 1fr 1.5fr;
            background: var(--surface);
            border-left: 2px solid var(--border);
            padding: 12px 18px;
            align-items: center;
        }

        .list-header {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            margin-bottom: 5px;
        }

        .book-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 25px;
            transition: 0.3s;
        }

        .book-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.1);
        }

        .genre-badge { font-size: 0.6rem; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        .book-title-text { font-family: 'Cinzel', serif; font-size: 0.95rem; color: #fff; line-height: 1.2; }
        .series-text { font-size: 0.6rem; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 8px; font-weight: 400; letter-spacing: 1px; }
        .author-text { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        
        .trope-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 15px; }
        .tag { font-size: 0.5rem; padding: 2px 5px; border: 1px solid var(--border); color: var(--text-muted); text-transform: uppercase; }

        @media (max-width: 768px) {
            .list-item { grid-template-columns: 1fr; gap: 5px; }
            .list-header { display: none; }
        }
    </style>
</head>
<body>

    <h1>The Vault</h1>
    <div class="subtitle">Complete Records</div>
    <div class="counter-box" id="book-counter">Archiving 0 Volumes</div>

    <div class="oracle-container">
        <div class="mood-buttons">
            <button class="mood-btn" onclick="consultOracle('ruined')">Destroy Me</button>
            <button class="mood-btn" onclick="consultOracle('corrupt')">Corrupt Me</button>
            <button class="mood-btn" onclick="consultOracle('rival')">The Rival</button>
            <button class="mood-btn" onclick="consultOracle('proximity')">Close Quarters</button>
            <button class="mood-btn" onclick="consultOracle('dark')">Dark & Twisted</button>
            <button class="mood-btn" onclick="consultOracle('chaos')">Something New</button>

        <div id="oracle-result">
            <div class="oracle-commentary">Peering into your future...</div>
            <div class="oracle-book-title"></div>
        </div>
    </div>

    <div class="view-toggle">
        <button id="grid-btn" class="toggle-btn active" onclick="setView('grid')">Grid View</button>
        <button id="list-btn" class="toggle-btn" onclick="setView('list')">List View</button>

    <div class="controls-container">
        <input type="text" id="search-input" placeholder="Search Title, Author, or Series..." onkeyup="filterBooks()">
        <div class="filter-row">
            <select id="genre-filter" class="filter-select" onchange="filterBooks()">
                <option value="all">All Categories</option>
                <option value="Romantasy">Romantasy</option>
                <option value="Dark Fantasy">Dark Fantasy</option>
                <option value="Dark Romance">Dark Romance</option>
                <option value="YA Romantasy">YA Romantasy</option>
                <option value="Paranormal / Monster">Paranormal / Monster</option>
                <option value="Contemporary">Contemporary</option>
            </select>
            <select id="trope-filter" class="filter-select" onchange="filterBooks()">

                <option value="Morally Grey MMC">Morally Grey</option>
                <option value="Who Did This To You?">Who Did This</option>
                <option value="Enemies to Lovers">Enemies</option>
                <option value="Touch Her & Die">Touch Her & Die</option>
                <option value="Forced Proximity">One Bed</option>
                <option value="Reverse Harem">Reverse Harem</option>
                <option value="Stalker">Stalker</option>
                <option value="Has Fairytale">Fairy Tale Retelling</option>
            </select>
        </div>
    </div>

    <div id="grid-container" class="book-grid"></div>
    
    <div id="list-container" class="book-list">
        <div class="list-item list-header">

            <div>Series</div>
            <div>Author</div>
            <div>Tropes</div>
        </div>
        <div id="list-items-target"></div>
    </div>

        let currentView = 'grid';

        function setView(view) {
            currentView = view;
            document.getElementById('grid-btn').classList.toggle('active', view === 'grid');
            document.getElementById('list-btn').classList.toggle('active', view === 'list');
            document.getElementById('grid-container').style.display = view === 'grid' ? 'grid' : 'none';
            document.getElementById('list-container').style.display = view === 'list' ? 'flex' : 'none';
            filterBooks();
        }

        function displayBooks(bookList) {
            const grid = document.getElementById('grid-container');
            const listTarget = document.getElementById('list-items-target');
            const counter = document.getElementById('book-counter');
            
            grid.innerHTML = '';
            listTarget.innerHTML = '';
            counter.innerText = `Archiving ${bookList.length} Volumes`;

            bookList.forEach(book => {
                let tags = '';
                if (book['Has Fairytale']) tags += `<span class="tag" style="border-color:#c5a059; color:#c5a059;">${book['Fairytale Retelling']}</span>`;
                if (book['Morally Grey MMC']) tags += '<span class="tag">Morally Grey</span>';
                if (book['Who Did This To You?']) tags += '<span class="tag">Who Did This</span>';
                if (book['Enemies to Lovers']) tags += '<span class="tag">Enemies</span>';
                if (book['Touch Her & Die']) tags += '<span class="tag">Touch Her & Die</span>';
                if (book['Forced Proximity']) tags += '<span class="tag">One Bed</span>';
                if (book['Reverse Harem']) tags += '<span class="tag">Reverse Harem</span>';
                if (book['Stalker']) tags += '<span class="tag" style="border-color:#ff4d4d; color:#ff4d4d;">Stalker</span>';

                const seriesDisplay = book['Series Name'] && book['Series Name'] !== 'nan' ? book['Series Name'] : '';

                // Grid Card
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <div class="genre-badge">${book['Genre']}</div>
                    <div class="book-title-text">${book['Book Title']}</div>
                    <div class="series-text">${seriesDisplay}</div>
                    <div class="author-text">${book['Author']}</div>
                    <div class="trope-tags">${tags}</div>
                `;
                grid.appendChild(card);

                // List Item
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="genre-badge" style="margin:0">${book['Genre']}</div>
                    <div class="book-title-text" style="font-size:0.85rem">${book['Book Title']}</div>
                    <div class="series-text" style="margin:0">${seriesDisplay}</div>
                    <div class="author-text">${book['Author']}</div>
                    <div class="trope-tags" style="margin:0">${tags}</div>
                `;
                listTarget.appendChild(item);
            });
        }

        function filterBooks() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const genre = document.getElementById('genre-filter').value;
            const trope = document.getElementById('trope-filter').value;

            const filtered = books.filter(b => {
                const matchesSearch = b['Book Title'].toLowerCase().includes(search) || 
                                     b['Author'].toLowerCase().includes(search) ||
                                     (b['Series Name'] && b['Series Name'].toLowerCase().includes(search));
                const matchesGenre = genre === 'all' || b['Genre'] === genre;
                const matchesTrope = trope === 'all' || b[trope] === true;
                return matchesSearch && matchesGenre && matchesTrope;
            });
            displayBooks(filtered);
        }

        function consultOracle(mood) {
            const resultDiv = document.getElementById('oracle-result');
            let options = [];
            let commentary = "";

            if (mood === 'ruined') { options = books.filter(b => b['Touch Her & Die']); commentary = "Total destruction."; }
            else if (mood === 'corrupt') { options = books.filter(b => b['Morally Grey MMC']); commentary = "The villain is the hero here."; }
            else if (mood === 'rival') { options = books.filter(b => b['Enemies to Lovers']); commentary = "A dangerous attraction."; }
            else if (mood === 'proximity') { options = books.filter(b => b['Forced Proximity']); commentary = "Nowhere to run."; }
            else if (mood === 'dark') { options = books.filter(b => b['Genre'] === 'Dark Fantasy'); commentary = "Into the shadows."; }
            else if (mood === 'chaos') { options = books; commentary = "Fate has chosen."; }

            if (options.length > 0) {
                const picked = options[Math.floor(Math.random() * options.length)];
                resultDiv.innerHTML = `
                    <div class="oracle-commentary">"${commentary}"</div>
                    <div class="oracle-book-title">${picked['Book Title']}</div>
                    <div class="author-text" style="font-size:0.65rem">${picked['Author']}</div>
                `;
            }
        }

        window.onload = () => {
            const random = books[Math.floor(Math.random() * books.length)];
            document.getElementById('oracle-result').innerHTML = `
                <div class="oracle-commentary">"Your destiny for tonight..."</div>
                <div class="oracle-book-title">${random['Book Title']}</div>
                <div class="author-text" style="font-size:0.65rem">${random['Author']}</div>
            `;
            displayBooks(books);
        };
    </script>
